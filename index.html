<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./assets/images/spotify-logo.png"> <!--To in top chrome tab*!-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Spoti-Clone | Premium Music Player</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3e3e3e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1ed760;
        }

        /* MAIN LAYOUT */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ========= SIDEBAR ========= */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            border-right: 1px solid rgba(30, 215, 96, 0.15);
            transition: all 0.3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.8px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1ed760, #0f6e32);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img i {
            font-size: 24px;
            color: white;
        }

        .logo span {
            background: linear-gradient(135deg, #1ed760 0%, #1a9e4a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #b3b3b3;
            transition: all 0.25s ease;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .nav-item i {
            font-size: 1.4rem;
            width: 28px;
        }

        .nav-item.active, .nav-item:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        .playlist-section {
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 24px;
        }

        .playlist-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #9b9b9b;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        .playlist-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .playlist-item {
            font-size: 0.9rem;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .playlist-item:hover {
            color: white;
            background: rgba(30,215,96,0.15);
            transform: translateX(5px);
        }

        /* ========= MAIN CONTENT ========= */
        .main {
            flex: 1;
            background: linear-gradient(180deg, #1a1a2e 0%, #0c0c0c 100%);
            overflow-y: auto;
            padding: 24px 32px 100px 32px;
        }

        /* Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-arrows {
            display: flex;
            gap: 16px;
        }

        .nav-arrows button {
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-arrows button:hover {
            background: #1ed760;
            transform: scale(1.05);
        }

        .user-menu {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(30,215,96,0.3);
            transition: 0.2s;
            cursor: pointer;
        }
        .user-menu:hover {
            border-color: #1ed760;
        }

        /* Hero Section */
        .hero-section {
            margin-bottom: 40px;
        }
        .greeting h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff, #1ed760);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .greeting p {
            color: #b3b3b3;
            font-size: 1rem;
        }

        /* Cards Grid */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 32px 0 20px 0;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .see-all {
            color: #b3b3b3;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .see-all:hover {
            color: #1ed760;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .music-card {
            background: rgba(24,24,24,0.9);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .music-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(30,215,96,0.1), transparent);
            transition: 0.5s;
        }

        .music-card:hover::before {
            left: 100%;
        }

        .music-card:hover {
            background: #2a2a2a;
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(30,215,96,0.4);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.6);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #2d2d3a, #1a1a1a);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-img i {
            font-size: 3.5rem;
            color: #1ed760;
        }

        .music-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-artist {
            font-size: 0.8rem;
            color: #a7a7a7;
        }

        /* ========= BOTTOM PLAYER ========= */
        .bottom-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(30,215,96,0.3);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 220px;
        }

        .track-cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #1ed760, #0f6e32);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(30,215,96,0.4);
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-cover i {
            font-size: 30px;
            color: white;
        }

        .track-details h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .track-details p {
            font-size: 0.75rem;
            color: #b3b3b3;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            max-width: 550px;
        }

        .control-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .control-buttons button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-buttons button:hover {
            color: #1ed760;
            transform: scale(1.1);
            background: rgba(255,255,255,0.05);
        }
        .play-pause {
            background: #1ed760;
            color: rgb(245, 236, 236);
            width: 48px;
            height: 48px;
        }
        .play-pause i {
            color: rgb(241, 235, 235);
            font-size: 1.3rem;
        }
        .play-pause:hover {
            background: #1fdf64;
            transform: scale(1.08);
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .time-current, .time-total {
            font-size: 0.7rem;
            color: #b3b3b3;
            font-weight: 500;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: #3e3e3e;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1ed760, #0f9e4a);
            border-radius: 5px;
            position: relative;
            transition: width 0.1s linear;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 140px;
        }
        .volume-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #b3b3b3;
            transition: 0.2s;
        }
        .volume-icon:hover {
            color: #1ed760;
        }
        input[type="range"] {
            width: 100px;
            background: #3e3e3e;
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1ed760;
            cursor: pointer;
            box-shadow: 0 0 5px #1ed760;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        .playing-animation {
            animation: pulse 1s ease infinite;
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(30,215,96,0.95);
            color: #000;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 90px;
                padding: 20px 8px;
            }
            .sidebar .logo span, .sidebar .nav-item span, .playlist-section {
                display: none;
            }
            .bottom-player {
                padding: 12px;
            }
            .track-info {
                min-width: 160px;
            }
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 16px;
            }
            .section-title {
                font-size: 1.4rem;
            }
            .greeting h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

    // ========= HELPER FUNCTIONS =========
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = isError ? 'rgba(220, 53, 69, 0.95)' : 'rgba(30,215,96,0.95)';
        toast.style.color = '#fff';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    function highlightActiveCard() {
        document.querySelectorAll('.music-card').forEach((card) => {
            const cardIndex = parseInt(card.getAttribute('data-track-index'));
            if (cardIndex === currentTrackIndex) {
                card.style.border = "2px solid #1ed760";
                card.style.transform = "scale(1.02)";
                card.style.background = "#2a2a2a";
            } else {
                card.style.border = "1px solid rgba(255,255,255,0.05)";
                card.style.transform = "scale(1)";
                card.style.background = "rgba(24,24,24,0.9";
            }
        });
    }

    // ========= MUSIC PLAYER CORE FUNCTIONS =========
    function loadTrack(index) {
        if (index < 0) index = 0;
        if (index >= tracks.length) index = 0;
        currentTrackIndex = index;
        const track = tracks[currentTrackIndex];
        
        audio.src = track.src;
        currentSongTitle.innerText = track.name;
        currentArtist.innerText = track.artist;
        coverArt.innerHTML = `<img src="${track.cover}" alt="${track.name}" onerror="this.parentElement.innerHTML='<i class=\'fas fa-music\'></i>'">`;
        
        progressFill.style.width = "0%";
        currentTimeSpan.innerText = "0:00";
        totalDurationSpan.innerText = "0:00";
        
        if (isPlaying) {
            audio.play().catch(e => {
                console.log("Autoplay blocked");
                isPlaying = false;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
        }
        
        highlightActiveCard();
        updateNowPlayingInfo();
    }

    function togglePlayPause() {
        if (isPlaying) {
            audio.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
            coverArt.classList.remove('playing-animation');
        } else {
            audio.play().catch(err => {
                console.warn("Playback failed:", err);
                showToast("Click anywhere to enable audio playback", true);
            });
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            isPlaying = true;
            coverArt.classList.add('playing-animation');
        }
    }

    function playTrack(index) {
        if (currentTrackIndex === index && audio.src && !audio.paused) {
            return;
        }
        loadTrack(index);
        audio.play().then(() => {
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            coverArt.classList.add('playing-animation');
            showToast(`Now playing: ${tracks[index].name}`);
        }).catch(() => {
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
    }

    function nextTrack() {
        let nextIndex;
        if (repeatMode === 'one') {
            nextIndex = currentTrackIndex;
        } else if (isShuffled) {
            do {
                nextIndex = Math.floor(Math.random() * tracks.length);
            } while (nextIndex === currentTrackIndex && tracks.length > 1);
        } else {
            nextIndex = (currentTrackIndex + 1) % tracks.length;
        }
        playTrack(nextIndex);
    }

    function prevTrack() {
        let prevIndex;
        if (repeatMode === 'one') {
            prevIndex = currentTrackIndex;
        } else if (isShuffled) {
            do {
                prevIndex = Math.floor(Math.random() * tracks.length);
            } while (prevIndex === currentTrackIndex && tracks.length > 1);
        } else {
            prevIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
        }
        playTrack(prevIndex);
    }

    function updateNowPlayingInfo() {
        document.title = `${tracks[currentTrackIndex].name} - Spotify Clone`;
    }

    // ========= PROGRESS & VOLUME CONTROLS =========
    function updateProgress() {
        if (audio.duration && !isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            totalDurationSpan.innerText = formatTime(audio.duration);
        }
    }

    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) {
            audio.currentTime = percent * audio.duration;
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        currentVolume = parseFloat(e.target.value);
        audio.volume = currentVolume;
        updateVolumeIcon();
    });

    volumeIcon.addEventListener('click', () => {
        if (audio.volume > 0) {
            audio.volume = 0;
            volumeSlider.value = 0;
        } else {
            audio.volume = currentVolume || 0.7;
            volumeSlider.value = currentVolume || 0.7;
        }
        updateVolumeIcon();
    });

    function updateVolumeIcon() {
        if (audio.volume === 0) {
            volumeIcon.className = "fas fa-volume-mute volume-icon";
        } else if (audio.volume < 0.5) {
            volumeIcon.className = "fas fa-volume-down volume-icon";
        } else {
            volumeIcon.className = "fas fa-volume-up volume-icon";
        }
    }

    // ========= SHUFFLE & REPEAT FUNCTIONS =========
    shuffleBtn.addEventListener('click', () => {
        isShuffled = !isShuffled;
        shuffleBtn.style.color = isShuffled ? '#1ed760' : 'white';
        showToast(isShuffled ? 'Shuffle mode ON' : 'Shuffle mode OFF');
    });

    repeatBtn.addEventListener('click', () => {
        if (repeatMode === 'none') {
            repeatMode = 'one';
            repeatBtn.innerHTML = '<i class="fas fa-repeat-1"></i>';
            showToast('Repeat: One song');
        } else if (repeatMode === 'one') {
            repeatMode = 'all';
            repeatBtn.innerHTML = '<i class="fas fa-redo-alt"></i>';
            showToast('Repeat: All songs');
        } else {
            repeatMode = 'none';
            repeatBtn.innerHTML = '<i class="fas fa-redo-alt"></i>';
            showToast('Repeat: OFF');
        }
        repeatBtn.style.color = repeatMode !== 'none' ? '#1ed760' : 'white';
    });

    // ========= GENERATE MUSIC CARDS =========
    function generateCards() {
        const mainGrid = document.getElementById('musicGrid');
        const recGrid = document.getElementById('recommendedGrid');
        mainGrid.innerHTML = '';
        recGrid.innerHTML = '';
        
        tracks.forEach((track, idx) => {
            const card = document.createElement('div');
            card.className = 'music-card';
            card.setAttribute('data-track-index', idx);
            card.innerHTML = `
                <div class="card-img">
                    <img src="${track.cover}" alt="${track.name}" onerror="this.parentElement.innerHTML='<i class=\'fas fa-music\'></i>'">
                </div>
                <div class="card-title">${track.name}</div>
                <div class="card-artist">${track.artist}</div>
                <div style="font-size:0.7rem; margin-top:8px; color:#1ed760;">
                    <i class="fas fa-play-circle"></i> Play now
                </div>
            `;
            card.addEventListener('click', () => playTrack(idx));
            
            if (idx < 6) {
                mainGrid.appendChild(card);
            } else {
                recGrid.appendChild(card);
            }
        });
    }

    // ========= EVENT LISTENERS =========
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => {
        if (repeatMode === 'one') {
            audio.currentTime = 0;
            audio.play();
        } else {
            nextTrack();
        }
    });
    audio.addEventListener('loadedmetadata', updateProgress);
    audio.addEventListener('canplay', () => {
        console.log('Audio ready to play');
    });

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    // ========= NAVIGATION =========
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            this.classList.add('active');
            const txt = this.innerText;
            if(txt.includes('Search')) {
                showToast('🔍 Search feature - Find your favorite music!');
            } else if(txt.includes('Library')) {
                showToast(`📚 Your library: ${tracks.length} amazing songs`);
            } else {
                showToast('🏠 Welcome to Home');
            }
        });
    });

    document.querySelectorAll('.playlist-item').forEach(pl => {
        pl.addEventListener('click', (e) => {
            const playlist = pl.innerText;
            showToast(`🎵 Playing playlist: ${playlist}`);
        });
    });

    document.getElementById('seeAllBtn')?.addEventListener('click', () => {
        showToast('✨ All trending tracks are here! Enjoy!');
    });

    document.getElementById('recommendedSeeAll')?.addEventListener('click', () => {
        showToast('🎧 Check out more recommendations!');
    });

    document.getElementById('backNavBtn')?.addEventListener('click', () => {
        showToast('◀ Navigation back');
    });

    document.getElementById('forwardNavBtn')?.addEventListener('click', () => {
        showToast('▶ Navigation forward');
    });

    // Initialize
    generateCards();
    loadTrack(0);
    audio.volume = 0.7;
    volumeSlider.value = 0.7;
    
    console.log('🎵 Spotify Clone Ready! Click any song to start playing.');
</script>
</body>
</html>
